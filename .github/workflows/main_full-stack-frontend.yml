# Azure Storage Static Website CI/CD

name: Build and deploy React frontend to Azure Storage

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install and build
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C2D1D9E316794100BEE67AD3226F28AE }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_68AA55E95AB14F3AB5D93B5E864676C1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CC041EB896B148FF9B0F4564DA35103A }}

      - name: Azure Blob Storage upload
        uses: azure/cli@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --destination '$web' \
              --source . \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
